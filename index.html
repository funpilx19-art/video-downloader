    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* আপনার সিগনেচার UI - সব সেম রাখা হয়েছে */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .downloader-card {
            background: #1a1a1a;
            width: 90%;
            max-width: 450px;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
        }
        .downloader-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,223,192,0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .logo { font-size: 55px; color: #00dfc0; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(0,223,192,0.3)); }
        h2 { font-size: 24px; margin-bottom: 8px; letter-spacing: 1px; }
        p.subtitle { color: #aaa; font-size: 13px; margin-bottom: 25px; }
        .input-box { position: relative; margin-bottom: 15px; display: flex; gap: 8px; }
        .input-wrapper { position: relative; flex-grow: 1; }
        input {
            width: 100%; padding: 16px 15px 16px 45px;
            border-radius: 12px; border: 2px solid #2c2c2c;
            background: #252525; color: white;
            font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00dfc0; background: #1d1d1d; }
        input.error-border { border-color: #ff4d4d; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #00dfc0; }
        .paste-btn { background: #252525; color: #00dfc0; border: 1px solid #333; padding: 0 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .paste-btn:hover { background: #333; border-color: #00dfc0; }
        button#dlBtn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: #00dfc0; color: #0f0f0f; font-size: 17px; font-weight: 700;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,223,192,0.2);
        }
        button#dlBtn:hover { background: #00b89e; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,223,192,0.4); }
        button#dlBtn:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }
        .supported-sites { margin-top: 20px; display: flex; justify-content: center; gap: 20px; font-size: 18px; color: #555; }
        #errorBox { color: #ff4d4d; font-size: 13px; margin-top: 12px; display: none; font-weight: 500; }
        #result {
            margin-top: 20px; display: none; padding: 15px;
            background: rgba(0, 223, 192, 0.1); border-radius: 12px;
            border: 1px solid rgba(0, 223, 192, 0.3); animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader {
            display: none; margin: 20px auto;
            border: 3px solid #333; border-top: 3px solid #00dfc0;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

<body>

<div class="downloader-card">
    <div class="logo"><i class="fas fa-bolt"></i></div>
    <h2>Funpilx Pro</h2>
    <p class="subtitle">Fast Video Downloader</p>
    
    <div class="input-box">
        <div class="input-wrapper">
            <i class="fas fa-link"></i>
            <input type="text" id="videoUrl" placeholder="Paste link here..." autocomplete="off">
        </div>
        <button class="paste-btn" onclick="pasteLink()">
            <i class="fas fa-paste"></i>
        </button>
    </div>

    <button id="dlBtn" onclick="handleDownload()">
        Download Now
    </button>

    <div class="supported-sites">
        <i class="fab fa-tiktok" title="TikTok"></i>
        <i class="fab fa-instagram" title="Instagram"></i>
        <i class="fab fa-youtube" title="YouTube Shorts"></i>
    </div>

    <div class="loader" id="loader"></div>
    <div id="errorBox"></div>

    <div id="result">
        <p style="color: #00dfc0; font-weight: 600;"><i class="fas fa-check-circle"></i> Download Started!</p>
        <p style="font-size: 11px; color: #888; margin-top: 4px;">Thanks for using Funpilx!</p>
    </div>
</div>

<script>
    async function pasteLink() {
        try {
            const text = await navigator.clipboard.readText();
            const input = document.getElementById('videoUrl');
            input.value = text;
            input.classList.remove('error-border');
            document.getElementById('errorBox').style.display = "none";
        } catch (err) {
            alert("Please paste manually.");
        }
    }

    function handleDownload() {
        const urlInput = document.getElementById('videoUrl');
        const videoUrl = urlInput.value.trim();
        const dlBtn = document.getElementById('dlBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const errorBox = document.getElementById('errorBox');

        if (!videoUrl || !videoUrl.startsWith("http")) {
            urlInput.classList.add('error-border');
            errorBox.innerText = "Please enter a valid link!";
            errorBox.style.display = "block";
            return;
        }

        // আপনার অরিজিনাল UI লজিক
        errorBox.style.display = "none";
        urlInput.classList.remove('error-border');
        result.style.display = "none";
        loader.style.display = "block";
        dlBtn.disabled = true;
        dlBtn.innerText = "Processing...";

        // আপনার অরিজিনাল ডাউনলোড ফাংশন (Direct Download)
        const API_BASE = "https://social-media-video-downloader-2.onrender.com";
        const finalUrl = `${API_BASE}/download?url=${encodeURIComponent(videoUrl)}`;
        window.location.href = finalUrl;

        // আপনার কাঙ্ক্ষিত অ্যাড লজিক (২ সেকেন্ড গ্যাপে)
        setTimeout(() => {
            window.open("https://omg10.com/4/10787232", "_blank");
            
            loader.style.display = "none";
            dlBtn.disabled = false;
            dlBtn.innerText = "Download Now";
            result.style.display = "block";
            urlInput.value = ""; 
        }, 2000);
    }

    document.getElementById('videoUrl').addEventListener('input', function() {
        this.classList.remove('error-border');
        document.getElementById('errorBox').style.display = "none";
    });
</script>

</body>
